<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord - Mbaay Mi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-seedling"></i>
                <div class="logo-text">
                    <h1 class="site-title">Mbaay Mi</h1>
                    <p class="site-tagline">Plateforme Agricole du Sénégal</p>
                </div>
            </div>
            <nav>
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Accueil</a></li>
                    <li><a href="annonces.html" class="nav-link">Annonces</a></li>
                    <li><a href="dashboard.html" class="nav-link active">Tableau de Bord</a></li>
                    <li><a href="contact.html" class="nav-link">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div class="stat-number" id="totalSubscriptions">0</div>
                <p>Abonnés totaux</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-chart-line"></i>
                <div class="stat-number" id="newThisMonth">0</div>
                <p>Nouveaux ce mois</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-eye"></i>
                <div class="stat-number" id="totalViews">0</div>
                <p>Vues totales</p>
            </div>
        </div>

        <div class="section-card">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-chart-line"></i> Évolution des Abonnements
                </h2>
            </div>
            <div class="section-content">
                <div class="chart-wrapper">
                    <canvas id="subscriptionChart"></canvas>
                </div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-table"></i> Statistiques par Région
                </h2>
            </div>
            <div class="section-content">
                <div class="dashboard-table">
                    <table>
                        <thead>
                            <tr><th>Région</th><th>Abonnés</th><th>Croissance</th><th>Activité</th></tr>
                        </thead>
                        <tbody id="statsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-cloud-sun"></i> Météo Agricole
                </h2>
            </div>
            <div class="section-content">
                <div class="weather-grid" id="weatherContainer"></div>
                <div class="filter-actions" style="margin-top: 1rem;">
                    <button class="btn-primary" id="refreshWeather">
                        <i class="fas fa-sync-alt"></i> Actualiser
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <p>&copy; 2025 Mbaay Mi - Tous droits réservés</p>
        </div>
    </footer>

    <script src="js/common.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
